<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VSIT Security Assessment</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      text-align: center;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #6366f1;
      color: white;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="card">
  <h2 id="question">Do you use Multi-Factor Authentication?</h2>

  <div id="answers">
    <button onclick="answer(20)">Yes</button>
    <button onclick="answer(0)">No</button>
  </div>

  <div id="result" class="hidden"></div>
</div>

<script>
  const questions = [
    "Do you use Multi-Factor Authentication?",
    "Do you regularly back up your data?",
    "Do you have a firewall in place?",
    "Do employees receive security training?",
    "Do you use antivirus software?"
  ];

  let current = 0;
  let score = 0;

  function answer(points) {
    score += points;
    current++;

    if (current < questions.length) {
      document.getElementById("question").innerText = questions[current];
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById("answers").style.display = "none";

    let risk = "High Risk";
    if (score >= 80) risk = "Low Risk";
    else if (score >= 40) risk = "Medium Risk";

    document.getElementById("result").classList.remove("hidden");
    document.getElementById("result").innerHTML = `
      <h3>Your Score: ${score}/100</h3>
      <p>${risk}</p>
      <button onclick="location.reload()">Restart</button>
    `;
  }
</script>

</body>
</html>
