<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VSIT Security Assessment</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  width: 420px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  animation: fadeIn 0.6s ease;
}

/* Question */
h2 {
  margin-bottom: 30px;
  font-weight: 500;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: all 0.25s ease;
}

button:hover {
  background: #6366f1;
  transform: translateY(-2px);
}

/* Progress Bar */
.progress {
  height: 6px;
  width: 100%;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-bottom: 25px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #6366f1;
  transition: width 0.4s ease;
}

/* Result */
.result {
  animation: fadeInUp 0.6s ease;
}

.score {
  font-size: 40px;
  font-weight: bold;
  margin: 20px 0;
}

/* Animations */
@keyframes fadeIn {
  from {opacity:0; transform: scale(0.95);}
  to {opacity:1; transform: scale(1);}
}

@keyframes fadeInUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="card">

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <h2 id="question">Loading...</h2>

  <div id="answers"></div>

  <div id="result" class="result" style="display:none;"></div>

</div>

<script>
const questions = [
  { text: "Do you use Multi-Factor Authentication?", yes: 20, no: 0 },
  { text: "Do you regularly back up your data?", yes: 20, no: 0 },
  { text: "Do you have a firewall in place?", yes: 20, no: 0 },
  { text: "Do employees receive security training?", yes: 20, no: 0 },
  { text: "Do you use antivirus software?", yes: 20, no: 0 }
];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const progressBar = document.getElementById("progressBar");
const resultEl = document.getElementById("result");

function renderQuestion() {
  const q = questions[current];

  questionEl.innerText = q.text;

  answersEl.innerHTML = `
    <button onclick="answer(${q.yes})">Yes</button>
    <button onclick="answer(${q.no})">No</button>
  `;

  progressBar.style.width = ((current) / questions.length) * 100 + "%";
}

function answer(points) {
  score += points;
  current++;

  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  progressBar.style.width = "100%";
  answersEl.style.display = "none";
  questionEl.style.display = "none";

  let risk = "High Risk";
  let color = "#ef4444";

  if (score >= 80) {
    risk = "Low Risk";
    color = "#22c55e";
  } else if (score >= 40) {
    risk = "Medium Risk";
    color = "#f59e0b";
  }

  resultEl.style.display = "block";
  resultEl.innerHTML = `
    <h3>Your Security Score</h3>
    <div class="score">${score}/100</div>
    <p style="color:${color}; font-size:18px;">${risk}</p>
    <button onclick="location.reload()">Restart Assessment</button>
  `;
}

renderQuestion();
</script>

</body>
</html>
